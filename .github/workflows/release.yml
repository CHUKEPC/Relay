name: Release

# Builds Relay for macOS, Windows and Linux on native runners (no Wine needed)
# and publishes every distributable to GitHub Releases.
#
# Trigger a release by pushing a version tag that matches package.json, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# Or run manually (workflow_dispatch) to build artifacts without publishing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            args: --x64 --arm64
          - os: windows-latest
            platform: win
            args: --x64
          - os: ubuntu-latest
            platform: linux
            args: --x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # AppImage tooling on recent Ubuntu needs FUSE present.
      - name: Linux build deps
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libfuse2 || true

      - name: Type-check + bundle
        run: npm run build

      - name: Package (${{ matrix.platform }})
        run: npx --no-install electron-builder --${{ matrix.platform }} ${{ matrix.args }} --publish never
        env:
          # Unsigned builds: don't let electron-builder hunt for a macOS identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.platform }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.snap
            release/*.blockmap
            release/latest*.yml

  release:
    name: Publish to Releases
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -R dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Relay ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: dist/**/*
